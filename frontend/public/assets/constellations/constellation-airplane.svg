<svg viewBox="0 0 220 120" xmlns="http://www.w3.org/2000/svg" class="constellation" data-name="Airplane">
  <g class="constellation-lines" opacity="0">
    <!-- Fuselage nose to tail -->
    <line x1="20" y1="60" x2="185" y2="60" stroke="#C8C0F8" stroke-width="0.8" opacity="0.6"/>
    <!-- Nose point -->
    <line x1="20" y1="60" x2="10" y2="60" stroke="#C8C0F8" stroke-width="0.8" opacity="0.6"/>
    <!-- Main wing left -->
    <line x1="90" y1="60" x2="55" y2="22" stroke="#C8C0F8" stroke-width="0.8" opacity="0.6"/>
    <line x1="55" y1="22" x2="105" y2="22" stroke="#C8C0F8" stroke-width="0.8" opacity="0.6"/>
    <line x1="105" y1="22" x2="90" y2="60" stroke="#C8C0F8" stroke-width="0.8" opacity="0.6"/>
    <!-- Main wing right (below) -->
    <line x1="90" y1="60" x2="55" y2="98" stroke="#C8C0F8" stroke-width="0.8" opacity="0.6"/>
    <line x1="55" y1="98" x2="105" y2="98" stroke="#C8C0F8" stroke-width="0.8" opacity="0.6"/>
    <line x1="105" y1="98" x2="90" y2="60" stroke="#C8C0F8" stroke-width="0.8" opacity="0.6"/>
    <!-- Tail fin vertical -->
    <line x1="175" y1="60" x2="175" y2="32" stroke="#C8C0F8" stroke-width="0.8" opacity="0.6"/>
    <line x1="175" y1="32" x2="195" y2="32" stroke="#C8C0F8" stroke-width="0.8" opacity="0.6"/>
    <line x1="195" y1="32" x2="185" y2="60" stroke="#C8C0F8" stroke-width="0.8" opacity="0.6"/>
    <!-- Tail horizontal -->
    <line x1="175" y1="60" x2="155" y2="75" stroke="#C8C0F8" stroke-width="0.8" opacity="0.6"/>
    <line x1="185" y1="60" x2="155" y2="75" stroke="#C8C0F8" stroke-width="0.8" opacity="0.6"/>
  </g>
  <g class="constellation-stars">
    <circle cx="10" cy="60" r="2.5" fill="#F0EEFF" opacity="0.9"/>
    <circle cx="20" cy="60" r="2" fill="#E8E4FF" opacity="0.65"/>
    <circle cx="90" cy="60" r="2.5" fill="#E8E4FF" opacity="0.75"/>
    <circle cx="185" cy="60" r="2.2" fill="#E8E4FF" opacity="0.7"/>
    <circle cx="55" cy="22" r="2" fill="#E8E4FF" opacity="0.65"/>
    <circle cx="105" cy="22" r="2" fill="#E8E4FF" opacity="0.65"/>
    <circle cx="55" cy="98" r="2" fill="#E8E4FF" opacity="0.65"/>
    <circle cx="105" cy="98" r="2" fill="#E8E4FF" opacity="0.65"/>
    <circle cx="175" cy="60" r="2" fill="#E8E4FF" opacity="0.65"/>
    <circle cx="175" cy="32" r="2" fill="#E8E4FF" opacity="0.65"/>
    <circle cx="195" cy="32" r="3" fill="#F0EEFF" opacity="0.9"/>
    <circle cx="155" cy="75" r="2" fill="#E8E4FF" opacity="0.65"/>
  </g>
</svg>
