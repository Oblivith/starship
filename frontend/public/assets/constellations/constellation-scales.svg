<svg viewBox="0 0 180 200" xmlns="http://www.w3.org/2000/svg" class="constellation" data-name="Scales">
  <g class="constellation-lines" opacity="0">
    <!-- Central pole -->
    <line x1="90" y1="30" x2="90" y2="170" stroke="#C8C0F8" stroke-width="0.8" opacity="0.6"/>
    <!-- Base -->
    <line x1="60" y1="170" x2="120" y2="170" stroke="#C8C0F8" stroke-width="0.8" opacity="0.6"/>
    <!-- Crossbeam -->
    <line x1="30" y1="70" x2="150" y2="70" stroke="#C8C0F8" stroke-width="0.8" opacity="0.6"/>
    <!-- Left chain -->
    <line x1="30" y1="70" x2="22" y2="110" stroke="#C8C0F8" stroke-width="0.8" opacity="0.6"/>
    <line x1="22" y1="110" x2="55" y2="110" stroke="#C8C0F8" stroke-width="0.8" opacity="0.6"/>
    <line x1="55" y1="110" x2="55" y2="70" stroke="#C8C0F8" stroke-width="0.8" opacity="0.6"/>
    <!-- Right chain -->
    <line x1="150" y1="70" x2="125" y2="118" stroke="#C8C0F8" stroke-width="0.8" opacity="0.6"/>
    <line x1="125" y1="118" x2="158" y2="118" stroke="#C8C0F8" stroke-width="0.8" opacity="0.6"/>
    <line x1="158" y1="118" x2="158" y2="70" stroke="#C8C0F8" stroke-width="0.8" opacity="0.6"/>
  </g>
  <g class="constellation-stars">
    <circle cx="90" cy="30" r="3" fill="#F0EEFF" opacity="0.95"/>
    <circle cx="90" cy="170" r="2" fill="#E8E4FF" opacity="0.65"/>
    <circle cx="60" cy="170" r="2" fill="#E8E4FF" opacity="0.65"/>
    <circle cx="120" cy="170" r="2" fill="#E8E4FF" opacity="0.65"/>
    <circle cx="30" cy="70" r="2.5" fill="#E8E4FF" opacity="0.75"/>
    <circle cx="150" cy="70" r="2.5" fill="#E8E4FF" opacity="0.75"/>
    <circle cx="90" cy="70" r="2.2" fill="#E8E4FF" opacity="0.7"/>
    <!-- Left pan -->
    <circle cx="22" cy="110" r="2" fill="#E8E4FF" opacity="0.65"/>
    <circle cx="55" cy="110" r="2" fill="#E8E4FF" opacity="0.65"/>
    <circle cx="55" cy="70" r="2" fill="#E8E4FF" opacity="0.65"/>
    <!-- Right pan (slightly lower - unbalanced) -->
    <circle cx="125" cy="118" r="2" fill="#E8E4FF" opacity="0.65"/>
    <circle cx="158" cy="118" r="2" fill="#E8E4FF" opacity="0.65"/>
    <circle cx="158" cy="70" r="2" fill="#E8E4FF" opacity="0.65"/>
  </g>
</svg>
